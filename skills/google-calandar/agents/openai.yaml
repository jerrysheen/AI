interface:
  display_name: "Google Calendar"
  short_description: "Verify and call a calendar web app"
  default_prompt: "Use $google-calandar to validate the Google Calendar Apps Script endpoint in url.txt before calendar or task operations. For broad queries like what I need to do today, prefer daily_brief so tasks and events are merged into one view for the full local day, including past items, then grouped by ended, in_progress, and upcoming. Keep quick task capture concise unless the user clearly wants more detail."
