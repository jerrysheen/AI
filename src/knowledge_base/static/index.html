<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Knowledge Search</title>
    <style>
      body {
        margin: 0;
        font: 14px/1.5 Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #202124;
        background: #fff;
      }
      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        display: flex;
        justify-content: flex-end;
        padding: 16px 24px 0;
      }
      .topbar a {
        color: #1a73e8;
        text-decoration: none;
        font-size: 13px;
      }
      .hero {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 72px 16px 28px;
      }
      .brand {
        font-size: 42px;
        font-weight: 600;
        letter-spacing: -0.03em;
        margin-bottom: 26px;
      }
      .brand .muted { color: #5f6368; }
      .search-shell {
        width: 100%;
        max-width: 760px;
      }
      .search-box {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        border: 1px solid #dfe1e5;
        border-radius: 26px;
        padding: 0 16px;
        box-shadow: 0 1px 6px rgba(32,33,36,0.08);
      }
      .search-box:focus-within {
        border-color: #c6dafc;
        box-shadow: 0 2px 10px rgba(26,115,232,0.15);
      }
      .search-box input {
        flex: 1;
        border: 0;
        outline: none;
        font-size: 16px;
        padding: 14px 0;
      }
      .search-actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 18px;
      }
      button {
        border: 1px solid #dadce0;
        background: #f8f9fa;
        color: #3c4043;
        border-radius: 4px;
        padding: 9px 16px;
        cursor: pointer;
        font: inherit;
      }
      button:hover {
        border-color: #c6c6c6;
        box-shadow: 0 1px 1px rgba(0,0,0,0.08);
      }
      .status {
        max-width: 760px;
        margin: 14px auto 0;
        color: #5f6368;
        font-size: 13px;
        text-align: center;
      }
      .results {
        width: 100%;
        max-width: 820px;
        margin: 24px auto 48px;
        padding: 0 16px;
      }
      .summary {
        margin-bottom: 18px;
        color: #5f6368;
        font-size: 13px;
      }
      .result-item {
        margin-bottom: 28px;
      }
      .result-title {
        color: #1a0dab;
        font-size: 22px;
        line-height: 1.3;
        margin-bottom: 4px;
      }
      .result-title a {
        color: inherit;
        text-decoration: none;
      }
      .result-title a:hover {
        text-decoration: underline;
      }
      .result-meta {
        color: #188038;
        font-size: 13px;
        margin-bottom: 6px;
      }
      .result-snippet {
        color: #4d5156;
        font-size: 14px;
      }
      mark.hit {
        background: #ffe08a;
        color: inherit;
        padding: 0 1px;
        border-radius: 2px;
      }
      .result-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }
      .chip {
        font-size: 12px;
        color: #5f6368;
        background: #f1f3f4;
        border-radius: 999px;
        padding: 3px 8px;
      }
      .empty {
        color: #5f6368;
        text-align: center;
        padding: 48px 0;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <a href="/debug">调试页</a>
      </div>
      <section class="hero">
        <div class="brand">Knowledge<span class="muted"> Search</span></div>
        <div class="search-shell">
          <div class="search-box">
            <input id="query" value="AI 优化" autocomplete="off">
          </div>
          <div class="search-actions">
            <button id="search-button">搜索知识库</button>
          </div>
        </div>
        <div class="status" id="status">输入 query 后执行检索，返回 top-k 相关文档。</div>
      </section>
      <section class="results" id="results">
        <div class="empty">还没有执行检索。</div>
      </section>
    </main>

    <script>
      async function readJson(response) {
        const text = await response.text();
        try { return JSON.parse(text); } catch { return { ok: false, error: text }; }
      }
      function escapeHtml(value) {
        return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }
      function escapeRegExp(value) {
        return String(value ?? "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }
      function highlightQuery(text, query) {
        const rawText = String(text ?? "");
        const rawQuery = String(query ?? "").trim();
        const escaped = escapeHtml(rawText);
        if (!rawQuery) {
          return escaped;
        }
        const pattern = new RegExp(`(${escapeRegExp(rawQuery)})`, "ig");
        return escaped.replace(pattern, '<mark class="hit">$1</mark>');
      }
      function renderResults(payload, query) {
        const items = payload.results || [];
        if (!items.length) {
          return '<div class="empty">没有命中结果。</div>';
        }
        return `
          <div class="summary">query: ${escapeHtml(query)} · mode=${escapeHtml(payload.mode || "")} · topK=${items.length}</div>
          ${items.map((item, index) => `
            <div class="result-item">
              <div class="result-title"><a href="/documents/read?id=${encodeURIComponent(item.documentId ?? item.id ?? "")}" target="_blank" rel="noreferrer">${escapeHtml(item.title || "Untitled")}</a></div>
              <div class="result-meta">${escapeHtml(item.sourceType || "document")} · documentId=${escapeHtml(item.documentId ?? item.id ?? "")}</div>
              ${item.createdAt ? `<div class="result-meta">createdAt=${escapeHtml(item.createdAt)}</div>` : ""}
              <div class="result-meta"><a href="/documents/read?id=${encodeURIComponent(item.documentId ?? item.id ?? "")}" target="_blank" rel="noreferrer">打开完整文档</a></div>
              <div class="result-snippet">${highlightQuery(item.snippet || item.aiSummary || "", query)}</div>
              ${(item.matchedSnippets || []).length > 1 ? `
                <div class="result-snippet" style="margin-top:6px;">
                  ${item.matchedSnippets.slice(1).map((snippet) => `• ${highlightQuery(snippet, query)}`).join("<br>")}
                </div>
              ` : ""}
              <div class="result-chips">
                <span class="chip">rank #${index + 1}</span>
                ${item.score !== undefined ? `<span class="chip">score ${Number(item.score).toFixed(4)}</span>` : ""}
                ${item.keywordScore !== undefined ? `<span class="chip">keyword ${Number(item.keywordScore).toFixed(2)}</span>` : ""}
                ${item.semanticScore !== undefined ? `<span class="chip">semantic ${Number(item.semanticScore).toFixed(4)}</span>` : ""}
                ${item.matchCount !== undefined ? `<span class="chip">matched nodes ${item.matchCount}</span>` : ""}
              </div>
            </div>
          `).join("")}
        `;
      }
      async function runSearch() {
        const query = document.getElementById("query").value.trim();
        document.getElementById("status").textContent = "检索中...";
        const response = await fetch(`/knowledge/search?q=${encodeURIComponent(query)}&topK=8`);
        const payload = await readJson(response);
        if (!payload.ok) {
          document.getElementById("status").textContent = payload.error || "检索失败";
          document.getElementById("results").innerHTML = '<div class="empty">请求失败。</div>';
          return;
        }
        document.getElementById("status").textContent = `返回 ${(payload.results || []).length} 条结果`;
        document.getElementById("results").innerHTML = renderResults(payload, query);
      }
      document.getElementById("search-button").addEventListener("click", runSearch);
      document.getElementById("query").addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          runSearch();
        }
      });
    </script>
  </body>
</html>
